<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>iCloud Photo Sync</title>
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            padding: 40px;
            background: #f5f5f5;
            color: #333;
        }
        .container {
            max-width: 600px;
            margin: 0 auto;
            text-align: center;
        }
        .icon {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
        }
        h1 {
            font-size: 24px;

        }
        .version {
            color: #888;
            font-size: 14px;
        }
    </style>
</head>
<body>
    <div class="container">
        <img src="images/icon_64.png" alt="iCloud Photo Sync" class="icon">
        <h1>iCloud Photo Sync</h1>
        <p class="version">Version 1.0.0</p>
    </div>
</body>
</html>
