# HAProxy 3.0 Configuration
# Configuration file: /var/packages/haproxy/var/haproxy.cfg
# Certificate directory: /var/packages/haproxy/var/crt/
# Documentation: https://www.haproxy.org/download/3.0/doc/configuration.txt

global
    user sc-haproxy
    daemon
    maxconn 256
    log ring@httplog local0 info
    spread-checks 10
    ssl-default-bind-options ssl-min-ver TLSv1.2

# Ring buffer for HTTP access logging (written to file)
ring httplog
    description "HTTP access log buffer"
    format rfc3164
    maxlen 2048
    size 65535
    backing-file /var/packages/haproxy/var/http-access.log

defaults
    mode http
    log global
    option httplog
    timeout connect 5s
    timeout client 50s
    timeout server 50s
    timeout tunnel 1h

# HAProxy Statistics page
# Access at http://<your-nas-ip>:8280/
listen stats
    bind :8280
    stats enable
    stats uri /
    stats show-legends
    stats refresh 10s
    stats realm HAProxy\ Statistics
    stats auth @user@:@passwd@

# ─────────────────────────────────────────────
# EXAMPLE: HTTP frontend with round-robin backend
# Uncomment and customize for your setup:
# ─────────────────────────────────────────────
#
# frontend http_front
#     bind :80
#     mode http
#     balance roundrobin
#     option forwardfor
#     default_backend http_back
#
# backend http_back
#     balance roundrobin
#     option httpchk GET /health
#     server web1 192.168.1.10:80 check
#     server web2 192.168.1.11:80 check
#
# ─────────────────────────────────────────────
# EXAMPLE: HTTPS frontend with SSL termination
# ─────────────────────────────────────────────
#
# frontend https_front
#     bind :443 ssl crt /var/packages/haproxy/var/crt/default.pem
#     mode http
#     http-request redirect scheme https unless { ssl_fc }
#     default_backend http_back
#
# ─────────────────────────────────────────────
# EXAMPLE: TCP load balancing (e.g., MySQL, SSH)
# ─────────────────────────────────────────────
#
# frontend tcp_front
#     bind :3306
#     mode tcp
#     option tcpka
#     option tcplog
#     default_backend tcp_back
#
# backend tcp_back
#     balance leastconn
#     server db1 192.168.1.20:3306 check
#     server db2 192.168.1.21:3306 check
